# model config for gpt-oss

decoder_block: "gpt_oss"
mlp_activations: ["silu", "linear"]
normalization_layer_epsilon: 1.0e-5
enable_dropout: false
logits_via_embedding: false
vocab_size: 200064
base_emb_dim: 6144
base_mlp_dim: 4096
base_moe_mlp_dim: 4096
base_num_query_heads: 48
base_num_kv_heads: 8
base_num_decoder_layers: 44
head_dim: 128
rope_theta: 500000
num_experts: 16
num_experts_per_tok: 4
attention_bias: true
attention_sinks: 4
sliding_window_size: 4096
inhomogeneous_layer_cycle_interval: 1
