workload_name: autotune-qwen3-next

bucket: lmt-tpu-datasets
mount_path: /mnt/bucket


config:
  model: qwen3-next
  gdn_chunk_size: 128
  base_emb_dim: 4096
  base_mlp_dim: 5120
  base_moe_mlp_dim: 5120
  base_num_query_heads: 32
  base_num_kv_heads: 8
  base_num_decoder_layers: 36
  head_dim: 128
  dataset_type: synthetic
  steps: 10
  max_target_length: 4096
  per_device_batch_size: 1
  learning_rate: 3e-4
  scan_layers: true
  remat_policy: full
  ici_fsdp_parallelism: -1
  dtype: bfloat16
  weight_dtype: bfloat16
  enable_checkpointing: false
  log_period: 1
  opt_type: adamw
  adam_weight_decay: 0.1
  run_name: autotune-qwen3-next
  base_output_directory: gs://lmt-tpu-datasets/experiments/ryan
