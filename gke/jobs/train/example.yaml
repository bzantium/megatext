# Example pretraining job. Copy this file, fill in the placeholders, and submit with:
#   python gke/submit.py pretrain --infra gke/infra/v5e.yaml --build gke/jobs/train/<your_job>.yaml
# Real production job YAMLs are gitignored (see .gitignore) — keep bucket names,
# dataset paths, and run names out of version control.
workload_name: pretrain-example
bucket: <your-gcs-bucket>              # GCS bucket to mount (no gs:// prefix)
mount_path: /mnt/bucket

vars:
  BUCKET_PREFIX: gs://<your-gcs-bucket>
  DATA_ROOT: /mnt/bucket/datasets/<your-corpus>/4096

config:
  model: qwen3-next
  base_emb_dim: 4096
  base_mlp_dim: 10240
  base_num_query_heads: 32
  base_num_kv_heads: 8
  base_num_decoder_layers: 36
  head_dim: 128
  dataset_type: fixed_arecord
  # Weighted mixture: "<weight> <path>" pairs. Replace with your own shards.
  dataset_path: >-
    100.0 ${DATA_ROOT}/dataset-a
    50.0 ${DATA_ROOT}/dataset-b
  data_cache_dir: ${BUCKET_PREFIX}/cache/indices
  jax_cache_dir: ${BUCKET_PREFIX}/cache/jax
  steps: 240000
  per_device_batch_size: 2
  global_batch_size: 7680
  learning_rate: 1e-3
  lr_schedule_type: wsd
  warmup_steps: 2400
  wsd_decay_steps: 24000
  final_learning_rate: 1e-4
  remat_policy: save_dot_except_mlpwi
  sa_block_q: 1024
  sa_block_kv: 1024
  sa_block_kv_compute: 1024
  sa_block_q_dkv: 1024
  sa_block_kv_dkv: 1024
  sa_block_kv_dkv_compute: 1024
  sa_block_q_dq: 1024
  sa_block_kv_dq: 1024
  gdn_chunk_size: 128
  dtype: bfloat16
  weight_dtype: bfloat16
  adam_b1: 0.9
  adam_b2: 0.95
  gradient_clipping_threshold: 1.0
  z_loss_multiplier: 5e-6
  max_target_length: 4096
  rope_theta: 10000
  attention: flash
  checkpoint_period: 400
  log_period: 1
  opt_type: muon
  adam_weight_decay: 0.1
  muon_weight_decay: 0.1
  muon_consistent_rms: 0.2
  run_name: <your-run-name>
  base_output_directory: ${BUCKET_PREFIX}/experiments/<your-user>
